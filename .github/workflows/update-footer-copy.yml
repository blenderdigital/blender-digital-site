name: Update footer copy

on:
  push:
    branches:
      - agent/update-homepage-nav-faq

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/update-homepage-nav-faq
          fetch-depth: 0

      - name: Replace footer description across HTML pages
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old = "We grow restaurant sales across DoorDash, Uber Eats, Grubhub, and Toast."
          new = "We grow restaurant sales across 3rd Party Platforms like DoorDash, Uber Eats, Grubhub, and Toast."
          updated = []
          for path in Path('.').rglob('*.html'):
              if any(part.startswith('.') for part in path.parts):
                  continue
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new), encoding='utf-8')
                  updated.append(str(path))
          print(f"Updated {len(updated)} HTML files")
          for path in updated:
              print(path)
          PY

      - name: Commit page updates
        run: |
          if git diff --quiet; then
            echo "No page changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' '**/*.html'
          git commit -m "Update footer description across marketing pages"
          git push origin HEAD:agent/update-homepage-nav-faq
