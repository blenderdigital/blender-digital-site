name: Sync marketing site shell

on:
  push:
    branches:
      - agent/update-homepage-nav-faq

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/update-homepage-nav-faq
          fetch-depth: 0

      - name: Update all HTML headers and footers
        run: python3 scripts/sync_site_shell.py

      - name: Commit generated page updates
        run: |
          if git diff --quiet; then
            echo "No page changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' '**/*.html'
          git commit -m "Sync marketing site header and footer across pages"
          git push origin HEAD:agent/update-homepage-nav-faq
