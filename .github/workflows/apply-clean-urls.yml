name: Apply clean URL migration

on:
  push:
    branches:
      - agent/remove-html-urls
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-html-urls
          fetch-depth: 0

      - name: Remove .html from public URLs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.parse import urlsplit, urlunsplit
          import json
          import posixpath
          import re
          import sys

          ROOT = Path('.')
          WORKFLOW = Path('.github/workflows/apply-clean-urls.yml')
          TRIGGER = Path('.github/clean-url-trigger.txt')
          INTERNAL_HOSTS = {'blenderdigital.co', 'www.blenderdigital.co'}
          TEXT_SUFFIXES = {'.html', '.xml', '.js', '.json'}

          def strip_html_from_path(path: str) -> str:
              if not path.endswith('.html'):
                  return path
              if path == '/index.html':
                  return '/'
              if path == 'index.html':
                  return '/'
              if path.endswith('/index.html'):
                  cleaned = path[:-len('/index.html')]
                  return cleaned or '/'
              return path[:-len('.html')]

          def clean_url(value: str) -> str:
              if '.html' not in value:
                  return value
              lowered = value.lower()
              if lowered.startswith(('mailto:', 'tel:', 'javascript:', 'data:', '#')):
                  return value

              if value.startswith('//'):
                  parsed = urlsplit('https:' + value)
                  if (parsed.hostname or '').lower() not in INTERNAL_HOSTS:
                      return value
                  path = strip_html_from_path(parsed.path)
                  cleaned = urlunsplit((parsed.scheme, parsed.netloc, path, parsed.query, parsed.fragment))
                  return cleaned[len('https:'):]

              parsed = urlsplit(value)
              if parsed.scheme in {'http', 'https'}:
                  if (parsed.hostname or '').lower() not in INTERNAL_HOSTS:
                      return value
                  path = strip_html_from_path(parsed.path)
                  return urlunsplit((parsed.scheme, parsed.netloc, path, parsed.query, parsed.fragment))

              if parsed.scheme:
                  return value

              path = strip_html_from_path(parsed.path)
              return urlunsplit(('', '', path, parsed.query, parsed.fragment))

          quoted_url = re.compile(r'(["\'])([^"\'\s<>]*\.html(?:[?#][^"\'\s<>]*)?)\1', re.IGNORECASE)
          internal_absolute = re.compile(
              r'https?://(?:www\.)?blenderdigital\.co/[^\s<>"\']*?\.html(?:[?#][^\s<>"\']*)?',
              re.IGNORECASE,
          )
          unquoted_attr = re.compile(
              r'(?P<prefix>\b(?:href|src|action|content)\s*=\s*)(?P<url>[^\s>"\']*\.html(?:[?#][^\s>"\']*)?)',
              re.IGNORECASE,
          )

          changed = []
          replacements = 0

          for path in sorted(ROOT.rglob('*')):
              if not path.is_file() or path.suffix.lower() not in TEXT_SUFFIXES:
                  continue
              if '.git' in path.parts or '.github' in path.parts:
                  continue
              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              updated = original

              def replace_absolute(match):
                  nonlocal_replacements[0] += 1
                  return clean_url(match.group(0))

              nonlocal_replacements = [0]
              updated = internal_absolute.sub(replace_absolute, updated)

              def replace_quoted(match):
                  cleaned = clean_url(match.group(2))
                  if cleaned != match.group(2):
                      nonlocal_replacements[0] += 1
                  return match.group(1) + cleaned + match.group(1)

              updated = quoted_url.sub(replace_quoted, updated)

              def replace_unquoted(match):
                  cleaned = clean_url(match.group('url'))
                  if cleaned != match.group('url'):
                      nonlocal_replacements[0] += 1
                  return match.group('prefix') + cleaned

              updated = unquoted_attr.sub(replace_unquoted, updated)

              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))
                  replacements += nonlocal_replacements[0]

          vercel_path = Path('vercel.json')
          config = json.loads(vercel_path.read_text(encoding='utf-8'))
          ordered = {}
          if '$schema' in config:
              ordered['$schema'] = config['$schema']
          ordered['cleanUrls'] = True
          for key, value in config.items():
              if key not in {'$schema', 'cleanUrls'}:
                  ordered[key] = value
          vercel_text = json.dumps(ordered, indent=2, ensure_ascii=False) + '\n'
          if vercel_text != vercel_path.read_text(encoding='utf-8'):
              vercel_path.write_text(vercel_text, encoding='utf-8')
              if str(vercel_path) not in changed:
                  changed.append(str(vercel_path))

          remaining = []
          for path in sorted(ROOT.rglob('*')):
              if not path.is_file() or path.suffix.lower() not in TEXT_SUFFIXES:
                  continue
              if '.git' in path.parts or '.github' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              for line_number, line in enumerate(text.splitlines(), 1):
                  if re.search(r'https?://(?:www\.)?blenderdigital\.co/[^\s<>"\']*\.html', line, re.IGNORECASE):
                      remaining.append(f'{path}:{line_number}: {line.strip()}')
                  for match in quoted_url.finditer(line):
                      value = match.group(2)
                      parsed = urlsplit(value if not value.startswith('//') else 'https:' + value)
                      is_external = parsed.scheme in {'http', 'https'} and (parsed.hostname or '').lower() not in INTERNAL_HOSTS
                      if not is_external:
                          remaining.append(f'{path}:{line_number}: {line.strip()}')

          if remaining:
              print('Internal .html URL references remain:', file=sys.stderr)
              print('\n'.join(remaining[:100]), file=sys.stderr)
              sys.exit(1)

          html_files = sorted(ROOT.rglob('*.html'))
          href_pattern = re.compile(r'\bhref\s*=\s*(["\'])(.*?)\1', re.IGNORECASE)
          broken = []

          def route_to_candidates(route_path: str, source: Path):
              if route_path.startswith('/'):
                  normalized = posixpath.normpath(route_path).lstrip('/')
              else:
                  normalized = posixpath.normpath(str(source.parent / route_path))
              if normalized in {'.', ''}:
                  normalized = ''
              if normalized.startswith('../'):
                  return []
              if normalized == 'tools' or normalized.startswith('tools/'):
                  return ['__TOOLS_REWRITE__']
              suffix = Path(normalized).suffix.lower()
              if suffix:
                  return [normalized]
              if not normalized:
                  return ['index.html']
              return [normalized + '.html', normalized + '/index.html']

          for source in html_files:
              text = source.read_text(encoding='utf-8', errors='ignore')
              for match in href_pattern.finditer(text):
                  href = match.group(2).strip()
                  if not href or href.startswith(('#', 'mailto:', 'tel:', 'javascript:', 'data:')):
                      continue
                  parsed = urlsplit(href if not href.startswith('//') else 'https:' + href)
                  if parsed.scheme in {'http', 'https'}:
                      if (parsed.hostname or '').lower() not in INTERNAL_HOSTS:
                          continue
                      route_path = parsed.path
                  elif parsed.scheme:
                      continue
                  else:
                      route_path = parsed.path
                  if not route_path:
                      continue
                  candidates = route_to_candidates(route_path, source)
                  if candidates == ['__TOOLS_REWRITE__']:
                      continue
                  if not candidates:
                      continue
                  if not any((ROOT / candidate).exists() for candidate in candidates):
                      broken.append(f'{source}: {href} -> {candidates}')

          if broken:
              print('Broken internal page links found:', file=sys.stderr)
              print('\n'.join(broken[:100]), file=sys.stderr)
              sys.exit(1)

          if TRIGGER.exists():
              TRIGGER.unlink()
          if WORKFLOW.exists():
              WORKFLOW.unlink()

          print(f'Updated {len(changed)} files and cleaned approximately {replacements} URL references.')
          for item in changed:
              print(item)
          PY

      - name: Validate diff
        run: git diff --check

      - name: Commit migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove .html from public URLs"
          git push origin HEAD:agent/remove-html-urls
