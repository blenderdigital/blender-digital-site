name: Update homepage resource CTA

on:
  push:
    branches:
      - agent/update-homepage-nav-faq

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/update-homepage-nav-faq
          fetch-depth: 0

      - name: Update homepage resource CTA
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<span class="resource-link-text">Explore all resources →</span>'
          new = '<span class="resource-link-text">View blog →</span>'
          if old not in text:
              raise SystemExit('Expected homepage resource CTA was not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Confirm Tools link remains in footer
        run: grep -q '<a href="/tools">Tools</a>' index.html

      - name: Commit homepage update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Change homepage resource CTA to View blog"
          git push origin HEAD:agent/update-homepage-nav-faq
